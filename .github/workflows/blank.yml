name: .NET CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore practice2026.sln
    
    - name: Build
      run: dotnet build practice2025.sln --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test practice2025.sln --no-build --configuration Release --verbosity normal
