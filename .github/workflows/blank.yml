name: .NET CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Debug - Show all files
      run: |
        echo "Current directory: $(pwd)"
        echo "All files and folders:"
        ls -la
        echo "All .csproj files:"
        find . -name "*.csproj"
        echo "All .sln files:"
        find . -name "*.sln*"

    - name: Find and build solution or project
      id: find-sln
      run: |
        # Ищем любой файл решения или проекта
        SLN_FILE=""
        
        # Ищем .slnx или .sln в любой папке
        SLN_FILE=$(find . -name "*.slnx" -o -name "*.sln" | head -n 1)
        
        # Если нет решения, ищем .csproj
        if [ -z "$SLN_FILE" ]; then
          SLN_FILE=$(find . -name "*.csproj" | head -n 1)
        fi
        
        if [ -z "$SLN_FILE" ]; then
          echo "⚠️ No solution or project file found in this branch!"
          echo "This branch might not have code yet."
          echo "Skipping build for this branch."
          echo "skip_build=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        echo "✅ Found file: $SLN_FILE"
        echo "solution_path=$SLN_FILE" >> $GITHUB_OUTPUT
        echo "skip_build=false" >> $GITHUB_OUTPUT

    - name: Restore dependencies
      if: steps.find-sln.outputs.skip_build != 'true'
      run: dotnet restore "${{ steps.find-sln.outputs.solution_path }}"

    - name: Build
      if: steps.find-sln.outputs.skip_build != 'true'
      run: dotnet build "${{ steps.find-sln.outputs.solution_path }}" --no-restore --configuration Release

    - name: Run tests
      if: steps.find-sln.outputs.skip_build != 'true'
      run: dotnet test "${{ steps.find-sln.outputs.solution_path }}" --no-build --configuration Release --verbosity normal
