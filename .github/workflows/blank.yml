name: .NET CI

on:
  push:
    branches: [ "task*", "feature/*", "main" ]  # Только для веток с задачами
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Пропускаем, если в коммите только удаления
    if: |
      !contains(github.event.head_commit.message, 'delete') &&
      !contains(github.event.head_commit.message, 'remove')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Check for code files
      id: check-code
      run: |
        # Проверяем наличие файлов проекта
        if find . -name "*.csproj" -o -name "*.sln*" | grep -q .; then
          echo "has_code=true" >> $GITHUB_OUTPUT
          SLN=$(find . -name "*.slnx" -o -name "*.sln" | head -n 1)
          if [ -z "$SLN" ]; then
            SLN=$(find . -name "*.csproj" | head -n 1)
          fi
          echo "solution_path=$SLN" >> $GITHUB_OUTPUT
          echo "✅ Building: $SLN"
        else
          echo "has_code=false" >> $GITHUB_OUTPUT
          echo "⚠️ No code files, skipping build (this is OK for deletion commits)"
        fi

    - name: Restore dependencies
      if: steps.check-code.outputs.has_code == 'true'
      run: dotnet restore "${{ steps.check-code.outputs.solution_path }}"

    - name: Build
      if: steps.check-code.outputs.has_code == 'true'
      run: dotnet build "${{ steps.check-code.outputs.solution_path }}" --no-restore --configuration Release

    - name: Run tests
      if: steps.check-code.outputs.has_code == 'true'
      run: dotnet test "${{ steps.check-code.outputs.solution_path }}" --no-build --configuration Release --verbosity normal
