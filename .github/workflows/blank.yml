name: .NET CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Show all files and folders
      run: |
        echo "=== Корень репозитория ==="
        ls -la
        echo "=== Ищем все .slnx файлы ==="
        find . -name "*.slnx"
        echo "=== Ищем все .sln файлы ==="
        find . -name "*.sln"

    - name: Set solution path
      run: echo "SOLUTION_PATH=practicA2026/task10/practice2026.slnx" >> $GITHUB_ENV

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration Release --verbosity normal
