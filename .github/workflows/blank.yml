name: .NET CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Find solution file
      id: find-sln
      run: |
        SLN_FILE=$(find . -maxdepth 2 -name "*.slnx" -o -name "*.sln" | head -n 1)
        if [ -z "$SLN_FILE" ]; then
          echo "No solution file found!"
          exit 1
        fi
        echo "solution_path=$SLN_FILE" >> $GITHUB_OUTPUT
        echo "Found solution: $SLN_FILE"

    - name: Restore dependencies
      run: dotnet restore ${{ steps.find-sln.outputs.solution_path }}

    - name: Build
      run: dotnet build ${{ steps.find-sln.outputs.solution_path }} --no-restore --configuration Release

    - name: Run tests
      run: dotnet test ${{ steps.find-sln.outputs.solution_path }} --no-build --configuration Release --verbosity normal
