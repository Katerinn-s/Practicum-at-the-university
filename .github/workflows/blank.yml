name: .NET CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: |
        cd practica2026
        dotnet restore practice2026.slnx

    - name: Build
      run: |
        cd practica2026
        dotnet build practice2026.slnx --no-restore --configuration Release

    - name: Run tests
      run: |
        cd practica2026
        dotnet test practice2026.slnx --no-build --configuration Release --verbosity normal
